version: 2
updates:
  - package-ecosystem: "pnpm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        # Exclude devDependencies from automatic updates if desired
        # Uncomment the following line to ignore devDependencies
        # update-types: ["version-update:semver-minor", "version-update:semver-patch"]
    allow:
      - dependency-type: "direct"
    reviewers:
      - "juninmd"
    assignees:
      - "juninmd"
    labels:
      - "dependencies"
      - "automated-pr"